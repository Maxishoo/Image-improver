version: '3.8'

services:
  app:
    build: .
    
    container_name: image-enhancer-dev
    
    ports:
      - "80:80"
    
    volumes:
      - .:/app
      - /app/node_modules
    
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    
    stdin_open: true
    tty: true